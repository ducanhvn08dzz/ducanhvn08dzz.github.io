<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nguyễn Đức Anh</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050505;
color:white;
display:flex;
justify-content:center;
min-height:100vh;
}

.container{
width:100%;
max-width:500px;
background:#0a0a0a;
min-height:100vh;
position:relative;
overflow:hidden;
}

/* rain */

#rain{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

/* banner */

.banner{
width:100%;
height:170px;
background:url("https://media.giphy.com/media/UC8DbMqXvkpd6/giphy.gif") center/cover;
}

/* profile */

.profile{
display:flex;
align-items:center;
gap:15px;
padding:15px;
margin-top:-45px;
}

/* avatar RGB neon */

.avatar{
width:85px;
height:85px;
border-radius:50%;
object-fit:cover;
border:3px solid red;
animation:neonRGB 3s linear infinite;
}

@keyframes neonRGB{

0%{
border-color:red;
box-shadow:0 0 10px red,0 0 25px red;
}

20%{
border-color:orange;
box-shadow:0 0 10px orange,0 0 25px orange;
}

40%{
border-color:yellow;
box-shadow:0 0 10px yellow,0 0 25px yellow;
}

60%{
border-color:lime;
box-shadow:0 0 10px lime,0 0 25px lime;
}

80%{
border-color:cyan;
box-shadow:0 0 10px cyan,0 0 25px cyan;
}

100%{
border-color:magenta;
box-shadow:0 0 10px magenta,0 0 25px magenta;
}

}

.name h1{
display:flex;
align-items:center;
gap:6px;
font-size:22px;
}

.verify{
display:flex;
align-items:center;
justify-content:center;
width:18px;
height:18px;
background:#1da1ff;
border-radius:50%;
font-size:10px;
}

.buttons{
display:flex;
gap:10px;
margin-top:8px;
}

.btn{
padding:8px 14px;
border-radius:8px;
border:none;
background:#1a1a1a;
color:white;
}

.follow{
background:#1da1ff;
}

.stats{
display:flex;
gap:15px;
padding:10px 15px;
color:#aaa;
flex-wrap:wrap;
}

.badges{
padding:10px 15px;
}

.badge{
display:flex;
align-items:center;
gap:10px;
background:#111;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.about{
padding:15px;
border-top:1px solid #222;
}

.role{
color:#aaa;
margin-top:5px;
}

.social{
display:flex;
gap:20px;
font-size:22px;
margin-top:10px;
}

.social a{
color:white;
}

.qr-card{
margin:20px 15px;
background:#0e0e0e;
border-radius:15px;
padding:20px;
display:flex;
justify-content:center;
}

.qr-img{
width:220px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<canvas id="rain"></canvas>

<div class="banner"></div>

<div class="profile">

<img src="avatar.png" class="avatar">

<div class="name">

<h1>
Nguyễn Đức Anh
<span class="verify">
<i class="fa-solid fa-check"></i>
</span>
</h1>

<div class="buttons">
<button class="btn follow">Follow</button>
<button class="btn">Message</button>
</div>

</div>
</div>

<div class="stats">
<span><b>1</b> Posts</span>
<span><b>10M</b> Followers</span>
<span><b>0</b> Following</span>
<span><b id="online">0</b> Online</span>
<span><b id="views">0</b> Views</span>
</div>

<div class="badges">

<div class="badge">
<i class="fa-solid fa-code"></i>
Rust C# Python
</div>

<div class="badge">
<i class="fa-solid fa-shield"></i>
Security Researcher
</div>

<div class="badge">
<i class="fa-solid fa-calendar"></i>
3 Years Experience
</div>

</div>

<div class="about">

<h3>Nguyễn Đức Anh</h3>
<p class="role">Info Me</p>

<div class="social">

<a href="#"><i class="fa-brands fa-facebook"></i></a>
<a href="#"><i class="fa-brands fa-tiktok"></i></a>
<a href="#"><i class="fa-solid fa-envelope"></i></a>
<a href="#"><i class="fa-brands fa-discord"></i></a>

</div>
</div>

<div class="qr-card">
<img src="qr-zalo.png" class="qr-img">
</div>

</div>

<!-- MUSIC -->

<audio id="bgMusic" loop>
<source src="https://files.catbox.moe/n7lirt.mp3" type="audio/mpeg">
</audio>

<script>

const music=document.getElementById("bgMusic");

function startMusic(){

music.play();

document.removeEventListener("click",startMusic);
document.removeEventListener("touchstart",startMusic);

}

document.addEventListener("click",startMusic);
document.addEventListener("touchstart",startMusic);

</script>

<script>

/* VIEW COUNTER */

fetch("https://api.countapi.xyz/hit/ducanhvn/views")
.then(res=>res.json())
.then(res=>{
document.getElementById("views").innerText=res.value
})

/* RAIN EFFECT */

const canvas=document.getElementById("rain");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let rainDrops=[];

for(let i=0;i<200;i++){

rainDrops.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
l:Math.random()*20,
s:Math.random()*5

})

}

function drawRain(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.strokeStyle="rgba(174,194,224,0.5)";
ctx.lineWidth=1;

rainDrops.forEach(d=>{

ctx.beginPath();
ctx.moveTo(d.x,d.y);
ctx.lineTo(d.x,d.y+d.l);
ctx.stroke();

d.y+=d.s;

if(d.y>canvas.height){

d.y=0;
d.x=Math.random()*canvas.width;

}

});

requestAnimationFrame(drawRain);

}

drawRain();

</script>

</body>
</html>
