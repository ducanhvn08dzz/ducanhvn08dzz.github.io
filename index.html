<!DOCTYPE html>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050505;
color:white;
display:flex;
justify-content:center;
min-height:100vh;
}

.container{
width:100%;
max-width:500px;
background:#0a0a0a;
min-height:100vh;
position:relative;
overflow:hidden;
}

/* rain */

#rain{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
}

/* lightning */

#lightning{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
}

.banner{
width:100%;
height:170px;
background:url("https://media.giphy.com/media/UC8DbMqXvkpd6/giphy.gif") center/cover;
}

.profile{
display:flex;
align-items:center;
gap:15px;
padding:15px;
margin-top:-45px;
position:relative;
z-index:5;
}

.avatar{
width:85px;
height:85px;
border-radius:50%;
object-fit:cover;
border:3px solid #00ff88;
box-shadow:0 0 15px #00ff88;
}

.name h1{
display:flex;
align-items:center;
gap:6px;
font-size:22px;
}

.verify{
display:flex;
align-items:center;
justify-content:center;
width:18px;
height:18px;
background:#1da1ff;
border-radius:50%;
font-size:10px;
}

.buttons{
display:flex;
gap:10px;
margin-top:8px;
}

.btn{
padding:8px 14px;
border-radius:8px;
border:none;
background:#1a1a1a;
color:white;
}

.follow{
background:#1da1ff;
}

.stats{
display:flex;
gap:15px;
padding:10px 15px;
color:#aaa;
flex-wrap:wrap;
}

.badges{
padding:10px 15px;
}

.badge{
display:flex;
align-items:center;
gap:10px;
background:#111;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.about{
padding:15px;
border-top:1px solid #222;
}

.role{
color:#aaa;
margin-top:5px;
}

.social{
display:flex;
gap:20px;
font-size:22px;
margin-top:10px;
}

.social a{
color:white;
}

.qr-card{
margin:20px 15px;
background:#0e0e0e;
border-radius:15px;
padding:20px;
display:flex;
justify-content:center;
}

.qr-img{
width:220px;
border-radius:10px;
}

</style>
</head>

<body>

<script>

/* VIEW COUNTER */

fetch("https://api.countapi.xyz/hit/ducanhvn/views")
.then(res=>res.json())
.then(res=>{
document.getElementById("views").innerText=res.value
})

/* RAIN */

const rainCanvas=document.getElementById("rain");
const rainCtx=rainCanvas.getContext("2d");

function resizeRain(){
const container=document.querySelector(".container");
rainCanvas.width=container.offsetWidth;
rainCanvas.height=container.offsetHeight;
}

resizeRain();
window.addEventListener("resize",resizeRain);

let drops=[];

for(let i=0;i<200;i++){
drops.push({
x:Math.random()*rainCanvas.width,
y:Math.random()*rainCanvas.height,
l:Math.random()*20+10,
s:Math.random()*5+5
});
}

function drawRain(){

rainCtx.clearRect(0,0,rainCanvas.width,rainCanvas.height);

rainCtx.strokeStyle="rgba(174,194,224,0.5)";
rainCtx.lineWidth=1;

drops.forEach(d=>{

rainCtx.beginPath();
rainCtx.moveTo(d.x,d.y);
rainCtx.lineTo(d.x,d.y+d.l);
rainCtx.stroke();

d.y+=d.s;

if(d.y>rainCanvas.height){
d.y=-20;
d.x=Math.random()*rainCanvas.width;
}

});

requestAnimationFrame(drawRain);

}

drawRain();

/* LIGHTNING */

const lightning=document.getElementById("lightning");
const lctx=lightning.getContext("2d");

lightning.width=rainCanvas.width;
lightning.height=rainCanvas.height;

function drawLightning(){

let x=Math.random()*lightning.width;
let y=0;

lctx.strokeStyle="white";
lctx.lineWidth=2;

lctx.beginPath();
lctx.moveTo(x,y);

while(y<lightning.height){

x+=(Math.random()-0.5)*40;
y+=Math.random()*30;

lctx.lineTo(x,y);

}

lctx.stroke();

setTimeout(()=>{
lctx.clearRect(0,0,lightning.width,lightning.height);
},120);

}

setInterval(()=>{
if(Math.random()>0.7){
drawLightning();
}
},3000);

</script>
